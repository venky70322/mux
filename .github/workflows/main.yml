name: MUX CI

permissions:
  contents: write

on: push

jobs:
  simulate:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
      - run: pwd
      - run: ls
      - run: unset VERILATOR_ROOT && make all
      - run: git config --global user.name github-actions
      - run: git config --global user.email actions@github.com
      - run: git checkout main
      - run: git merge "${GITHUB_REF_NAME}" --allow-unrelated-histories
      - run: git push origin main

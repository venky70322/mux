name: MUX CI

permissions:
  contents: write
  pull-requests: write

on: push

jobs:
  simulate:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
      - run: pwd
      - run: ls
      - run: unset VERILATOR_ROOT && make all

      - name: Auto merge branch to main
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git checkout main
          git merge $GITHUB_REF_NAME
          git push origin main
